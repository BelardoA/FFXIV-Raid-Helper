services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DJANGO_DEBUG=false
      - DJANGO_SECRET_KEY=change-me-in-production
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
      - BACKEND_ORIGIN=http://127.0.0.1:8000
      - DJANGO_DB_DIR=/app/backend/data
    volumes:
      - db-data:/app/backend/data

volumes:
  db-data:
